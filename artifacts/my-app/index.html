<!DOCTYPE html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Exclusive Detroit</title>
    <meta name="description" content="The insider's guide to Detroit's hidden bars, rooftops, dining, and nightlife. If you know, you know." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color — separate light/dark so iOS status bar matches -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0A0A" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAF8F5" />

    <!-- iOS / Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Exclusive Detroit" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Preload above-the-fold hero image — eliminates LCP delay -->
    <link rel="preload" as="image" href="/detroit-skyline.jpg" />

    <!-- Fonts — loaded in <head> to eliminate flash of unstyled text on iOS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- No-FOUC: apply saved theme before React mounts -->
    <script>
      (function(){
        var t=localStorage.getItem("ed-theme");
        if(t==="dark")document.documentElement.setAttribute("data-theme","dark");
        else if(t==="light")document.documentElement.setAttribute("data-theme","light");
      })();
    </script>

      *, *::before, *::after { box-sizing: border-box; }
      button { font-size: inherit; line-height: inherit; }
      input::placeholder, textarea::placeholder { color: var(--c-ph); }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        background: var(--c-black);
        -webkit-tap-highlight-color: transparent;
        -webkit-text-size-adjust: 100%;
        transition: background 0.3s;
        overscroll-behavior: none;
      }
      body {
        overscroll-behavior: none;
        overflow-x: hidden;
      }
      /*
       * LOCKED PRODUCTION FIX — do not remove or simplify.
       *
       * iPhone Safari / PWA installed mode can show a false bottom gap on the
       * Leaflet map due to viewport compositing and safe-area rendering quirks.
       * This overshoot-based containment fix is intentional: the map tile layer
       * renders 20px past the visible viewport bottom so iOS can never expose a
       * gap, regardless of rounding or compositing errors. The parent wrapper's
       * overflow:hidden clips the extra 20px visually while Leaflet still
       * generates tiles for that region.
       *
       * Do NOT remove or simplify without testing on:
       *   1. Real iPhone Safari
       *   2. Installed PWA / home-screen app mode
       *   3. After scrolling Explore first, then opening Map
       */
      .leaflet-container {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: -20px !important;
        height: auto !important;
      }
      /* ── Match Leaflet background to map theme ── */
      /* ── Scroll highlight — DOM-toggled, bypasses React state scheduling ── */
      .hl-active {
        border-color: var(--c-goldD) !important;
        box-shadow: 0 0 0 1.5px rgba(201,168,76,0.22), 0 4px 22px rgba(201,168,76,0.07) !important;
      }
      /* Creator CTA — premium hover/tap feedback */
      .creator-cta:hover,.creator-cta:active {
        border-color: var(--c-gold) !important;
        color: var(--c-gold) !important;
        background: var(--c-excl-bg) !important;
      }
      /* Light mode: use dark amber for clear contrast against warm/white cards */
      [data-theme="light"] .hl-active {
        border-color: var(--c-gold) !important;
        box-shadow: 0 0 0 1.5px rgba(138,96,16,0.40), 0 4px 22px rgba(138,96,16,0.13) !important;
      }
      @media (prefers-color-scheme: light) {
        html:not([data-theme="dark"]) .hl-active {
          border-color: var(--c-gold) !important;
